<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Đăng Ký - Garage Auto</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&family=Oswald:wght@700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style-dangky.css">
</head>
<body class="register-page">

    <div class="split-screen">
        <div class="left-side">
            <div class="text-content text-white">
                <h3 class="Oswald-font text-uppercase" style="font-size: 3rem; line-height: 1;">Đẳng Cấp<br><span style="color: #cc0000;">Xế Cưng</span></h3>
                <p style="max-width: 400px; opacity: 0.7;">Gia nhập cộng đồng Garage Auto để nhận đặc quyền chăm sóc xe 5 sao tại Nghệ An.</p>
            </div>
        </div>

        <div class="right-side">
            <a href="index.html" class="back-home">← QUAY LẠI TRANG CHỦ</a>
            
            <div class="reg-header">
                <h2 class="text-white">ĐĂNG KÝ</h2>
                <p style="color: #666; font-size: 14px; margin-bottom: 40px;">Bắt đầu hành trình bảo dưỡng chuyên nghiệp ngay hôm nay.</p>
            </div>

            <form action="#">
                <div class="form-group-custom">
                    <label>Họ và tên</label>
                    <input type="text" class="input-style" placeholder="VÍ DỤ: LÊ XUÂN ĐỨC" required>
                </div>

                <div class="form-group-custom">
                    <label>Số điện thoại</label>
                    <input type="tel" class="input-style" placeholder="NHẬP SỐ ĐIỆN THOẠI" required>
                </div>

                <div class="form-group-custom">
                    <label>Mật khẩu</label>
                    <input type="password" class="input-style" placeholder="••••••••" required>
                </div>

                <button type="submit" class="btn-reg-full">XÁC NHẬN GIA NHẬP</button>
            </form>

            <div style="margin-top: 30px; text-align: center; font-size: 13px;">
                <span style="color: #444;">Bạn đã là thành viên?</span> 
                <a href="dangnhap.html" style="color: #cc0000; text-decoration: none; font-weight: bold; margin-left: 5px;">ĐĂNG NHẬP</a>
            </div>
        </div>
    </div>

</body>
</html>
